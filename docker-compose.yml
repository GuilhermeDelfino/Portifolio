services:
  portfolio:
    build: .
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot

  # Optional: uncomment to use with Certbot for SSL
  # certbot:
  #   image: certbot/certbot
  #   volumes:
  #     - certbot-certs:/etc/letsencrypt
  #     - certbot-www:/var/www/certbot
  #   command: certonly --webroot -w /var/www/certbot -d yourdomain.com --email youremail@gmail.com --agree-tos --no-eff-email

volumes:
  certbot-certs:
  certbot-www:
